<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="portal-version" content="20260721-01">


<title>SWS HQ Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fa;
    font-family:'Segoe UI',sans-serif;
}

.hero{
    background:#003E7E;
    color:white;
    padding:40px 0;
}

.hero h1{
    font-weight:300;
}

.card-custom{
    background:white;
    border-radius:15px;
    box-shadow:0 3px 12px rgba(0,0,0,.08);
    padding:25px;
    margin-top:25px;
    margin-bottom:60px;
}

.department-header{
    background:#eef4ff;
    color:#003E7E;
    font-weight:600;
    padding:12px;
    border-radius:8px;
    margin-top:25px;
}

.table td,
.table th{
    vertical-align:middle;
}

.doc-table{
    width:100%;
    table-layout:fixed;
}

.doc-table th,
.doc-table td{
    overflow-wrap:anywhere;
}

.doc-table .col-docno{width:16%;}
.doc-table .col-title{width:30%;}
.doc-table .col-type{width:13%;}
.doc-table .col-rev{width:7%;}
.doc-table .col-date{width:14%;}
.doc-table .col-open{width:10%;}
.doc-table .col-guide{width:10%;}

.doc-table th:nth-child(4),
.doc-table td:nth-child(4),
.doc-table th:nth-child(6),
.doc-table td:nth-child(6),
.doc-table th:nth-child(7),
.doc-table td:nth-child(7){
    text-align:center !important;
}


.btn-guide{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:34px;
    height:34px;
    border-radius:50%;
    background:#dc3545;
    color:#fff;
    text-decoration:none;
    font-size:16px;
}

.btn-guide:hover{
    background:#b02a37;
    color:#fff;
}

.btn-open{
    background:#003E7E;
    color:white;
}

.btn-open:hover{
    background:#002f60;
    color:white;
}

.stats{
    color:#6b7280;
    font-size:14px;
    margin-bottom:10px;
}

.back-home{
    display:inline-block;
    margin-top:15px;
    background:white;
    color:#003E7E;
    text-decoration:none;
    padding:9px 18px;
    border-radius:30px;
    font-weight:600;
    font-size:14px;
}

.back-home:hover{
    background:#eef4ff;
    color:#002f60;
}


.portal-layout{
    display:grid;
    grid-template-columns:minmax(0, 1fr) 360px;
    gap:24px;
    align-items:start;
    margin-top:25px;
    margin-bottom:60px;
}

.portal-layout .card-custom{
    margin-top:0;
    margin-bottom:0;
}

.quick-access-panel{
    position:sticky;
    top:22px;
}

.quick-access-title{
    color:#003E7E;
    font-size:30px;
    font-weight:300;
    margin:0 0 16px;
}

.quick-access-list{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.quick-access-card{
    display:grid;
    grid-template-columns:92px minmax(0,1fr) 42px;
    gap:14px;
    align-items:center;
    background:linear-gradient(135deg,#f1f6ff,#ffffff);
    border:1px solid #d7e5f7;
    border-radius:18px;
    padding:16px;
    text-decoration:none;
    box-shadow:0 4px 14px rgba(0,62,126,.06);
    transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}

.quick-access-card:hover{
    transform:translateY(-2px);
    border-color:#aac7ea;
    box-shadow:0 12px 28px rgba(0,62,126,.12);
}

.quick-access-image{
    width:92px;
    height:76px;
    border-radius:12px;
    background:#fff;
    border:1px solid #e4e9f0;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    padding:8px;
}

.quick-access-image img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.quick-access-placeholder{
    font-size:32px;
}

.quick-access-content{
    min-width:0;
}

.quick-access-content h3{
    color:#003E7E;
    font-size:17px;
    font-weight:700;
    margin:0 0 7px;
    line-height:1.3;
}

.quick-access-description{
    color:#4b5563;
    font-size:13px;
    line-height:1.45;
    margin-bottom:10px;
}

.quick-access-meta{
    display:grid;
    grid-template-columns:1fr;
    gap:6px;
}

.quick-access-meta div{
    border-top:1px solid #d9e3f0;
    padding-top:6px;
}

.quick-access-meta span{
    display:block;
    color:#64748b;
    font-size:9px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
}

.quick-access-meta strong{
    display:block;
    color:#111827;
    font-size:12px;
    font-weight:500;
    margin-top:2px;
}

.quick-access-arrow{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#003E7E;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:21px;
    box-shadow:0 7px 16px rgba(0,62,126,.20);
}

.quick-access-empty{
    background:#fff;
    border:1px dashed #cbd5e1;
    border-radius:16px;
    padding:22px;
    color:#64748b;
    text-align:center;
    font-size:14px;
}

@media(max-width:1200px){
    .portal-layout{
        grid-template-columns:minmax(0,1fr) 320px;
    }

    .quick-access-card{
        grid-template-columns:76px minmax(0,1fr) 38px;
        padding:14px;
    }

    .quick-access-image{
        width:76px;
        height:68px;
    }
}

@media(max-width:992px){
    .portal-layout{
        grid-template-columns:1fr;
    }

    .quick-access-panel{
        position:static;
    }

    .quick-access-list{
        display:grid;
        grid-template-columns:repeat(2,minmax(0,1fr));
    }
}

@media(max-width:650px){
    .quick-access-list{
        grid-template-columns:1fr;
    }

    .quick-access-card{
        grid-template-columns:74px minmax(0,1fr) 38px;
    }

    .card-custom{
        padding:16px;
    }

    .doc-table{
        min-width:800px;
    }

    #content{
        overflow-x:auto;
    }
}

</style>

</head>

<body>

<div class="hero">

<div class="container">

<h1>HQ Portal</h1>

<p>
All Controlled Documents
</p>

<a href="index.html?v=20260721-01" class="back-home">← Back to Homepage</a>

</div>

</div>

<div class="container">

<div class="portal-layout">

    <main class="card-custom">

        <input
            type="text"
            id="searchBox"
            class="form-control"
            placeholder="Search document..."
        >

        <div class="stats mt-3" id="stats">
            Loading documents...
        </div>

        <div id="content"></div>

    </main>

    <aside class="quick-access-panel">
        <h2 class="quick-access-title">Quick Access</h2>
        <div id="quickAccessList" class="quick-access-list"></div>
    </aside>

</div>

</div>


<script>
/*
PORTAL CACHE VERSION: 20260721-01
When publishing a new portal revision, change this version value
in all three HTML files, for example: 20260721-02.
*/
const PORTAL_VERSION = "20260721-01";


/*
=========================================================
HOW TO USE THIS FILE WITHOUT IIS
=========================================================

Recommended server folder structure:

\\SERVER\SWS-HQ-Portal\
│
├── hq.html
└── documents\
    ├── HR\
    │   ├── HR-01.pdf
    │   └── HR-02.pdf
    ├── Procurement\
    │   └── PR-01.pdf
    └── Quality\
        └── QA-01.pdf

For documents stored inside the same portal folder, use links like:

documents/HR/HR-01.pdf

You may also use a full server path, for example:

\\SERVER\Quality\QA-01.pdf

or a mapped drive path:

Q:\1. HQ\1. QUALITY\1. PROCEDURES\QA-01.pdf

To add, remove, or update documents, edit the documents array below.
*/


/*
=========================================================
QUICK ACCESS
=========================================================
Edit the items below to change the HQ Quick Access panel.

image:
- Use a direct image URL, or
- Use a local image such as "images/quality-induction.png"

link:
- Website: https://...
- Relative page/file: folder/file.html
*/

const quickAccessItems = [
    {
        title: "SWS Quality Induction",
        description: "No description available.",
        applicability: "Worksite & HQ",
        owner: "Quality Department",
        image: "https://dummyimage.com/240x160/ffffff/003e7e.png&text=SWS+QUALITY%0AINDUCTION",
        link: "https://www.youtube.com/watch?v=s98qxYBhgvs"
    },
    {
        title: "Quality Dashboard",
        description: "Open the latest SWS quality performance dashboard.",
        applicability: "HQ",
        owner: "Quality Department",
        image: "",
        link: "#"
    },
    {
        title: "IMS Manual",
        description: "Quick access to the current Integrated Management System Manual.",
        applicability: "HQ",
        owner: "QHSE Department",
        image: "",
        link: "#"
    }
];

const documents = [
    {
        department: "HR",
        docNo: "HR-01",
        title: "HR Procedure",
        type: "Procedure",
        revNo: "0",
        revDate: "24/06/2026",
        storage: "Relative",
        link: "Q:\\1. HQ\\1. QUALITY\\1. PROCEDURES\\QP-SWSPR-03 - Supplier Quality Audit (SQA) Rev 00.pdf",
        videoLink: "https://www.youtube.com/watch?v=s98qxYBhgvs"
    },
    {
        department: "HR",
        docNo: "HR-02",
        title: "Employment Procedure",
        type: "Procedure",
        revNo: "1",
        revDate: "01/06/2026",
        storage: "Server",
        link: "\\\\SERVER\\HR\\HR-02.pdf",
        videoLink: "https://www.youtube.com/watch?v=s98qxYBhgvs"
    },
    {
        department: "Procurement",
        docNo: "PR-01",
        title: "Purchase Procedure",
        type: "Procedure",
        revNo: "1",
        revDate: "08/01/2026",
        storage: "Relative",
        link: "documents/Procurement/PR-01.pdf",
        videoLink: ""
    },
    {
        department: "Quality",
        docNo: "QA-01",
        title: "Internal Audit Procedure",
        type: "Procedure",
        revNo: "0",
        revDate: "10/06/2026",
        storage: "Relative",
        link: "documents/Quality/QA-01.pdf",
        videoLink: "https://www.youtube.com/watch?v=s98qxYBhgvs"
    }
];

function safe(value){
    return value ? String(value).trim() : "";
}

function escapeHTML(value){
    return safe(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function encodePath(path){
    return path
        .split("/")
        .map(part => encodeURIComponent(part))
        .join("/");
}

function getDocumentLink(doc){
    const link = safe(doc.link);

    if(!link){
        return "#";
    }

    // Full web link
    if(/^https?:\/\//i.test(link)){
        return link;
    }

    // UNC network path: \\SERVER\Folder\File.pdf
    if(link.startsWith("\\\\")){
        return "file://///" + link
            .replace(/^\\+/, "")
            .replaceAll("\\", "/")
            .split("/")
            .map(part => encodeURIComponent(part))
            .join("/");
    }

    // Mapped drive path: Q:\Folder\File.pdf
    if(/^[A-Za-z]:\\/.test(link)){
        return "file:///" + link
            .replaceAll("\\", "/")
            .split("/")
            .map(part => encodeURIComponent(part))
            .join("/");
    }

    // Relative link inside the same server folder
    return encodePath(link);
}

function getVideoLink(doc){
    return safe(doc.videoLink || doc.video || doc.youtubeLink);
}

function renderGuideButton(doc){
    const videoLink = getVideoLink(doc);

    if(!videoLink){
        return "";
    }

    return `
        <a
            href="${escapeHTML(videoLink)}"
            target="_blank"
            rel="noopener noreferrer"
            class="btn-guide"
            title="Watch Guide"
            aria-label="Watch Guide"
        >▶</a>
    `;
}


function renderQuickAccess(){
    const container = document.getElementById("quickAccessList");

    if(!quickAccessItems.length){
        container.innerHTML = `
            <div class="quick-access-empty">
                No Quick Access item available.
            </div>
        `;
        return;
    }

    container.innerHTML = quickAccessItems.map(item => {
        const image = safe(item.image);
        const imageHTML = image
            ? `<img src="${escapeHTML(image)}" alt="${escapeHTML(item.title)}">`
            : `<span class="quick-access-placeholder">📄</span>`;

        return `
            <a
                class="quick-access-card"
                href="${escapeHTML(item.link || "#")}"
                target="_blank"
                rel="noopener noreferrer"
            >
                <div class="quick-access-image">
                    ${imageHTML}
                </div>

                <div class="quick-access-content">
                    <h3>${escapeHTML(item.title)}</h3>

                    <div class="quick-access-description">
                        ${escapeHTML(item.description || "No description available.")}
                    </div>

                    <div class="quick-access-meta">
                        <div>
                            <span>Applicability</span>
                            <strong>${escapeHTML(item.applicability || "-")}</strong>
                        </div>

                        <div>
                            <span>Owner</span>
                            <strong>${escapeHTML(item.owner || "-")}</strong>
                        </div>
                    </div>
                </div>

                <span class="quick-access-arrow">→</span>
            </a>
        `;
    }).join("");
}

function renderDocuments(docs){
    const departments = {};

    docs.forEach(doc => {
        const department = safe(doc.department) || "Unassigned";

        if(!departments[department]){
            departments[department] = [];
        }

        departments[department].push(doc);
    });

    document.getElementById("stats").innerHTML =
        docs.length + " document(s) available";

    let html = "";

    Object.keys(departments).sort().forEach(department => {
        html += `
            <div class="department-header">
                ${escapeHTML(department)}
                (${departments[department].length})
            </div>

            <table class="table table-hover doc-table">
                <colgroup>
                    <col class="col-docno">
                    <col class="col-title">
                    <col class="col-type">
                    <col class="col-rev">
                    <col class="col-date">
                    <col class="col-open">
                    <col class="col-guide">
                </colgroup>

                <thead>
                    <tr>
                        <th>Document No</th>
                        <th>Title</th>
                        <th>Type</th>
                        <th class="text-center">Rev</th>
                        <th>Rev Date</th>
                        <th class="text-center">Open</th>
                        <th class="text-center">Guide</th>
                    </tr>
                </thead>

                <tbody>
        `;

        departments[department].forEach(doc => {
            html += `
                <tr>
                    <td>${escapeHTML(doc.docNo)}</td>
                    <td>${escapeHTML(doc.title)}</td>
                    <td>${escapeHTML(doc.type)}</td>
                    <td class="text-center">${escapeHTML(doc.revNo)}</td>
                    <td>${escapeHTML(doc.revDate)}</td>
                    <td class="text-center">
                        <a
                            href="${getDocumentLink(doc)}"
                            target="_blank"
                            rel="noopener noreferrer"
                            class="btn btn-sm btn-open"
                        >Open</a>
                    </td>
                    <td class="text-center">${renderGuideButton(doc)}</td>
                </tr>
            `;
        });

        html += `
                </tbody>
            </table>
        `;
    });

    document.getElementById("content").innerHTML =
        html || "No document found.";
}

function applySearch(){
    const searchBox = document.getElementById("searchBox");
    const search = safe(searchBox.value).toLowerCase();

    document.querySelectorAll("tbody tr").forEach(row => {
        row.style.display =
            row.innerText.toLowerCase().includes(search) ? "" : "none";
    });
}

document.getElementById("searchBox").addEventListener("input", applySearch);

renderDocuments(documents);
renderQuickAccess();

</script>


</body>

</html>
